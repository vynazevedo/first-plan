name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target
      - name: cargo test
        run: cargo test --workspace --release
        working-directory: engine

  lsp-integration:
    name: LSP integration (rust-analyzer, gopls, ts-lsp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine -> target
      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest
      - name: Install typescript-language-server
        run: npm install -g typescript-language-server typescript
      - name: Verify LSP servers in PATH
        run: |
          which rust-analyzer
          which gopls
          which typescript-language-server
      - name: Build engine
        run: cargo build --release
        working-directory: engine
      - name: LSP status sanity check
        run: |
          ./engine/target/release/first-plan-engine lsp status --json | tee /tmp/lsp.json
          jq -e '.servers | map(select(.installed)) | length >= 3' /tmp/lsp.json
      - name: Run LSP integration tests
        run: cargo test --release --workspace lsp_
        working-directory: engine
